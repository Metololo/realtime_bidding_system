name: CI

on:
  push:
    branches: [ main, main ]
  pull_request:
    branches: [ main, main ]

jobs:
  quality-check:
    name: Quality and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          check-latest: true
          cache: true

      - name: Check Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "❌ The following files are not formatted"
            gofmt -l .
            exit 1
          fi

      - name: Run Linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Run Tests
        run: make test